<!DOCTYPE html>
<html>
<head>
    <title>BitRate - Cadastro e Avaliação</title>
    <meta charset="UTF-8">
    <style>
        /* Um estilo básico só para não ficar tudo colado */
        textarea { width: 100%; max-width: 500px; height: 150px; }
        .bloco { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
<h1>Sistema BitRate</h1>

<div class="bloco">
    <h3>Cadastrar Restaurante</h3>
    <input type="text" id="nome" placeholder="Nome do Restaurante"><br>
    <input type="text" id="cozinha" placeholder="Tipo de Cozinha"><br>
    <input type="text" id="especialidade" placeholder="Especialidade"><br>
    <input type="text" id="endereco" placeholder="Endereço"><br>
    <button onclick="salvar()">Salvar Restaurante</button>
</div>

<div class="bloco">
    <h3>Deixar uma Avaliação</h3>
    <label>Nota (1 a 5):</label>
    <select id="estrelas">
        <option value="5">5 Estrelas</option>
        <option value="4">4 Estrelas</option>
        <option value="3">3 Estrelas</option>
        <option value="2">2 Estrelas</option>
        <option value="1">1 Estrela</option>
    </select><br><br>

    <label>Sua Review:</label><br>
    <textarea id="comentario" placeholder="Escreva sua review aqui (até 1000 palavras)..."></textarea><br>

    <button onclick="salvarAvaliacao()">Postar Avaliação</button>
</div>

<hr>
<h2>Lista de Restaurantes</h2>
<ul id="lista"></ul>

<script>
    const URL_RESTAURANTES = '/api/restaurantes';
    const URL_AVALIACOES = '/api/avaliacoes';

    // SALVAR RESTAURANTE
    async function salvar() {
        const dados = {
            nome: document.getElementById('nome').value,
            cozinha: document.getElementById('cozinha').value,
            especialidade: document.getElementById('especialidade').value,
            endereco: document.getElementById('endereco').value
        };

        await fetch(URL_RESTAURANTES, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dados)
        });

        alert("Restaurante salvo!");
        listar();
    }

    // SALVAR AVALIAÇÃO (AQUI ENTRA O PASSO NOVO)
    async function salvarAvaliacao() {
        const dadosAvaliacao = {
            estrelas: document.getElementById('estrelas').value,
            comentario: document.getElementById('comentario').value
        };

        await fetch(URL_AVALIACOES, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dadosAvaliacao)
        });

        alert("Avaliação enviada!");
        document.getElementById('comentario').value = ''; // Limpa o campo de texto
    }

    // LISTAR RESTAURANTES
    async function listar() {
        const res = await fetch(URL_RESTAURANTES);
        const restaurantes = await res.json();
        const listaUl = document.getElementById('lista');

        listaUl.innerHTML = '';
        restaurantes.forEach(r => {
            listaUl.innerHTML += `<li><strong>${r.nome}</strong> - ${r.cozinha}</li>`;
        });
    }

    listar();
</script>
</body>
</html>
