<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - BitRate</title>
</head>
<body>
    <h1>Entrar no BitRate</h1>
    
    <form th:action="@{/login}" method="post">
        <label>E-mail:</label>
        <input type="email" name="username" required /><br><br>
        
        <label>Senha:</label>
        <input type="password" name="password" required /><br><br>
        
        <button type="submit">Entrar</button>
    </form>
    
    <p>Ainda não tem conta? <a th:href="@{/cadastro}">Registe-se aqui</a></p>
    <br>
    <a th:href="@{/}">Voltar para o Início</a>
</body>
</html>
