<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitRate - Login</title>
    <style>
        /* Configurações Gerais */
        :root {
            --primary-color: #fca311; /* Laranja BitRate */
            --secondary-color: #14213d; /* Azul Escuro */
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container do Painel de Login */
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-container h1 {
            color: var(--secondary-color);
            margin-bottom: 10px;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .login-container h1 span {
            color: var(--primary-color);
        }

        .login-container p {
            color: #666;
            margin-bottom: 30px;
        }

        /* Formulário */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--secondary-color);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Garante que o padding não estoure a largura */
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* Botão */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-login:hover {
            background-color: #000;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888;
        }

        .footer-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Bit<span>Rate</span></h1>
        <p>Acesse para avaliar restaurantes</p>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" placeholder="exemplo@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        
        <div class="footer-text">
            Não tem uma conta? <a href="/cadastro">Cadastre-se aqui</a>
        </div>

        <div th:if="${param.erro}" 
            style="color: #d90429; background: #fbdfdf; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid #d90429;">
                <i class="fas fa-exclamation-circle"></i> E-mail ou senha incorretos.
        </div>

        <div th:if="${param.sucesso}" 
            style="color: #2b9348; background: #eafbea; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid #2b9348;">
            <i class="fas fa-check-circle"></i> Cadastro realizado! Pode entrar.
        </div>
    </div>

</body>
</html>
